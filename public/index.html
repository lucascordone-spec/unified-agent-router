<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Agent Router - Profit Dashboard</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 2rem;
        }
        h1 {
            color: #38bdf8;
            font-weight: 600;
        }
        .metrics {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .metric-card {
            background-color: #1e293b;
            padding: 1.5rem;
            border-radius: 0.5rem;
            flex: 1;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .metric-title {
            font-size: 0.875rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            color: #f8fafc;
            margin-top: 0.5rem;
        }
        .profit-value {
            color: #4ade80; /* Green for profits */
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1e293b;
            border-radius: 0.5rem;
            overflow: hidden;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th {
            background-color: #0f172a;
            color: #94a3b8;
            font-weight: 500;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .aggregator-badge {
            background-color: #3b82f6;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Unified Agent Router</h1>
    <p>Performance & Profit Dashboard (Fee: 0.02%)</p>

    <div class="metrics">
        <div class="metric-card">
            <div class="metric-title">Volume Routed (MVP Simulated)</div>
            <div class="metric-value" id="totalVolume">$0.00</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">Total Projected Profit (0.02%)</div>
            <div class="metric-value profit-value" id="totalProfit">$0.00</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">Total Routes Generated</div>
            <div class="metric-value" id="routesGenerated">0</div>
        </div>
    </div>

    <h2>Recent Routing Activity</h2>
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Aggregator</th>
                <th>Path</th>
                <th>Volume</th>
                <th>Estimated Profit</th>
            </tr>
        </thead>
        <tbody id="logsTable">
            <!-- Logs will be injected here -->
        </tbody>
    </table>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('totalVolume').innerText = '$' + data.totalVolumeUsd.toFixed(2);
                document.getElementById('totalProfit').innerText = '$' + data.totalProfitUsd.toFixed(4);
                document.getElementById('routesGenerated').innerText = data.routesGenerated;

                const tbody = document.getElementById('logsTable');
                tbody.innerHTML = '';
                
                // Show latest first
                data.logs.slice().reverse().forEach(log => {
                    const tr = document.createElement('tr');
                    
                    const timeStr = new Date(log.timestamp).toLocaleTimeString();
                    
                    tr.innerHTML = `
                        <td>${timeStr}</td>
                        <td><span class="aggregator-badge">${log.aggregator}</span></td>
                        <td>${log.fromToken.substring(0,6)}... &rarr; ${log.toToken.substring(0,6)}...</td>
                        <td>$${log.volumeUsd.toFixed(2)}</td>
                        <td style="color: #4ade80;">+$${log.projectedProfitUsd.toFixed(4)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error("Failed to fetch stats", err);
            }
        }

        fetchStats();
        // Refresh every 5 seconds
        setInterval(fetchStats, 5000);
    </script>
</body>
</html>
